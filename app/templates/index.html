<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Infra Pilot</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: #f4f5f7;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 20px;
    background: #1f2937;
    color: white;
    font-size: 18px;
    font-weight: 600;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: #2563eb;
    color: white;
  }
  .msg.assistant {
    align-self: flex-start;
    background: white;
    color: #111827;
    border: 1px solid #e5e7eb;
  }
  .msg.pending {
    align-self: flex-start;
    background: white;
    color: #9ca3af;
    border: 1px solid #e5e7eb;
    font-style: italic;
  }
  .sources {
    margin-top: 8px;
    font-size: 12px;
    color: #6b7280;
  }
  form#ask-form {
    display: flex;
    gap: 8px;
    padding: 16px 20px;
    background: white;
    border-top: 1px solid #e5e7eb;
  }
  #question {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 15px;
  }
  #send-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    font-size: 15px;
    cursor: pointer;
  }
  #send-btn:disabled {
    background: #9ca3af;
    cursor: not-allowed;
  }
</style>
</head>
<body>

<header>🖥️ Infra Pilot</header>

<div id="chat"></div>

<form id="ask-form">
  <input id="question" type="text" placeholder="서버나 문서에 대해 물어보세요... (예: 운영2 용량 알려줘)" autocomplete="off" autofocus>
  <button id="send-btn" type="submit">전송</button>
</form>

<script>
const chat = document.getElementById('chat');
const form = document.getElementById('ask-form');
const input = document.getElementById('question');
const sendBtn = document.getElementById('send-btn');

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addSources(container, sources) {
  if (!sources || sources.length === 0) return;
  const div = document.createElement('div');
  div.className = 'sources';
  div.textContent = '출처: ' + sources.join(', ');
  container.appendChild(div);
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const question = input.value.trim();
  if (!question) return;

  addMessage('user', question);
  input.value = '';
  sendBtn.disabled = true;

  const pending = addMessage('pending', '답변 생성 중...');

  try {
    const res = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question }),
    });
    const data = await res.json();

    pending.remove();
    const answerDiv = addMessage('assistant', data.answer);
    addSources(answerDiv, data.sources);
  } catch (err) {
    pending.remove();
    addMessage('assistant', '오류: 서버에 연결할 수 없습니다.');
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
});
</script>

</body>
</html>
